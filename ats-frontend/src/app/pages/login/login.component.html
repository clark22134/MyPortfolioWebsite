<div class="login-shell">
  <div class="login-card card-elevated">
    <div class="login-brand">
      <span class="brand-mark">H</span>
      <div>
        <div class="brand-name">HireFlow</div>
        <div class="brand-sub muted">by Clark</div>
      </div>
    </div>

    <h1>Sign in</h1>
    <p class="muted">An applicant tracking system built to feel calm, focused, and fast.</p>

    <form (ngSubmit)="submit()" autocomplete="on" class="login-form">
      <div>
        <label class="field-label" for="username">Username</label>
        <input class="input" id="username" name="username" type="text"
               autocomplete="username" required
               [(ngModel)]="username" />
      </div>
      <div>
        <label class="field-label" for="password">Password</label>
        <input class="input" id="password" name="password" type="password"
               autocomplete="current-password" required
               [(ngModel)]="password" />
      </div>

      @if (error()) {
        <div class="field-error" role="alert">{{ error() }}</div>
      }

      <button type="submit" class="btn btn-primary" [disabled]="submitting()">
        @if (submitting()) {
          <span class="spinner" aria-hidden="true"></span> Signing in…
        } @else {
          Sign in
        }
      </button>
    </form>

    <div class="demo-section">
      <div class="demo-heading">
        <span>Demo accounts</span>
        <span class="muted demo-hint">Click to autofill</span>
      </div>
      <div class="demo-grid">
        @for (account of demoAccounts; track account.username) {
          <button type="button" class="demo-card" (click)="fill(account)">
            <div class="demo-username">{{ account.username }}</div>
            <div class="demo-role">{{ account.role }}</div>
            <div class="demo-description">{{ account.description }}</div>
          </button>
        }
      </div>
    </div>
  </div>
</div>
