sonar.projectKey=clark22134_MyPortfolioWebsite
sonar.organization=clark22134

# Project information
sonar.projectName=Portfolio Website
sonar.projectVersion=1.0

# Source code (exclude test files)
sonar.sources=portfolio-backend/src/main/java,portfolio-chatbot-backend/src/main/java,portfolio-frontend/src/app,ats-backend/src/main/java,ats-frontend/src/app,ecommerce-backend/src/main/java,ecommerce-frontend/src/app

# Test code
sonar.tests=portfolio-backend/src/test/java,portfolio-chatbot-backend/src/test/java,ats-backend/src/test/java,ecommerce-backend/src/test/java

# Test file patterns for frontend (spec files are tests within source directory)
sonar.test.inclusions=**/*.spec.ts

# Java settings
sonar.java.binaries=portfolio-backend/target/classes,portfolio-chatbot-backend/target/classes,ats-backend/target/classes,ecommerce-backend/target/classes
sonar.java.source=21

# ── Source exclusions ─────────────────────────────────────────────────────────
# Exclude spec files from production sources, generated code, build output, and
# AWS Lambda glue (StreamLambdaHandler delegates to Spring via the serverless
# adapter; no testable business logic, can't run without the Lambda runtime).
sonar.exclusions=**/*.spec.ts,**/node_modules/**,**/dist/**,**/target/**,**/*.jar,**/build-wrapper-dump.json,**/StreamLambdaHandler.java

# ── Coverage exclusions ──────────────────────────────────────────────────────
# Each entry below is excluded because it has no testable logic, or because
# testing it would require external infrastructure (OpenAI, real filesystem,
# Spring Boot context startup).
#
# 1. Tests, build helpers, environments — already not real production code.
# 2. AWS Lambda + Spring @Configuration glue — no logic, only wiring.
# 3. Portfolio chatbot RAG path — KnowledgeIngestionService, RagService, and
#    WebConfig are integration-only: they require an OpenAI API key, a populated
#    vector store, and bundled knowledge files. The controller (which IS tested
#    to 96 %+) sits in front of them and is the unit-testable surface area.
# 4. Angular HTML templates — declarative views; unit tests already cover the
#    .ts component logic. Template-branch coverage is exercised by the a11y/E2E
#    suite, not the unit layer.
# 5. Angular bootstrap files — main.ts and app.config.ts only wire providers.
# 6. TypeScript interface/model files — type-only declarations have no
#    runtime code to execute.
# 7. Java entities/DTOs/enums — Lombok-generated getters/setters and pure value
#    types with no behavior.
sonar.coverage.exclusions=\
  **/*.spec.ts,\
  **/test/**,\
  **/test-setup.ts,\
  **/test-helpers.ts,\
  **/environments/environment*.ts,\
  **/main.ts,\
  **/app.config.ts,\
  **/app.routes.ts,\
  **/app.component.ts,\
  **/StreamLambdaHandler.java,\
  **/ChatbotConfig.java,\
  **/WebConfig.java,\
  **/PortfolioChatbotApplication.java,\
  **/RagService.java,\
  **/KnowledgeIngestionService.java,\
  **/Citation.java,\
  **/PortfolioAssistantController.ChatRequest.java,\
  **/portfolio-chatbot-backend/src/main/java/com/portfolio/chatbot/dto/**,\
  **/*.html,\
  **/src/app/models/**,\
  **/ats-backend/src/main/java/com/clarksprojects/ats/entity/**,\
  **/ats-backend/src/main/java/com/clarksprojects/ats/dto/**,\
  **/ats-backend/src/main/java/com/clarksprojects/ats/AtsApplication.java,\
  **/portfolio-backend/src/main/java/com/portfolio/backend/entity/**,\
  **/portfolio-backend/src/main/java/com/portfolio/backend/dto/**,\
  **/portfolio-backend/src/main/java/com/portfolio/backend/PortfolioBackendApplication.java,\
  **/ecommerce-backend/src/main/java/**/entity/**,\
  **/ecommerce-backend/src/main/java/**/dto/**,\
  **/ecommerce-backend/src/main/java/**/EcommerceBackendApplication.java

# ── Duplication (copy-paste detector) exclusions ─────────────────────────────
# 1. Flyway SQL migrations — seed-data INSERT blocks are structurally identical
#    by design (one row per candidate); flagging them as "duplication" is noise.
# 2. Java entities/DTOs/enums — Lombok-decorated value classes with identical
#    annotations (@Getter/@Setter/@Builder) trip CPD without representing real
#    duplicated logic.
# 3. TypeScript model interfaces — pure type declarations with no logic.
sonar.cpd.exclusions=\
  **/db/migration/*.sql,\
  **/src/main/resources/data*.sql,\
  **/entity/**,\
  **/dto/**,\
  **/*Application.java,\
  **/src/app/models/**

# Java coverage - JaCoCo XML reports generated by mvn test in each backend module
sonar.coverage.jacoco.xmlReportPaths=portfolio-backend/target/site/jacoco/jacoco.xml,portfolio-chatbot-backend/target/site/jacoco/jacoco.xml,ats-backend/target/site/jacoco/jacoco.xml,ecommerce-backend/target/site/jacoco/jacoco.xml

# JavaScript/TypeScript coverage - LCOV reports generated by ng test --coverage in each frontend.
# Angular puts the file at coverage/<project-name>/lcov.info; these paths match
# what the CI restore step copies into each frontend's coverage/ directory.
sonar.javascript.lcov.reportPaths=portfolio-frontend/coverage/portfolio-frontend/lcov.info,ats-frontend/coverage/ats-frontend/lcov.info,ecommerce-frontend/coverage/angular-ecommerce/lcov.info
