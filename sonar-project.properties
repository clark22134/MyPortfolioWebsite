sonar.projectKey=clark22134_MyPortfolioWebsite
sonar.organization=clark22134

# Project information
sonar.projectName=Portfolio Website
sonar.projectVersion=1.0

# Multi-module configuration — each module gets its own projectBaseDir so that
# LCOV SF: paths (e.g. src/app/...) resolve correctly without ambiguity.
sonar.modules=ats-backend,ats-frontend,ecommerce-backend,ecommerce-frontend,portfolio-backend,portfolio-frontend

# ---------------------------------------------------------------------------
# ATS Backend
# ---------------------------------------------------------------------------
ats-backend.sonar.projectBaseDir=ats-backend
ats-backend.sonar.projectName=ATS Backend
ats-backend.sonar.sources=src/main/java
ats-backend.sonar.tests=src/test/java
ats-backend.sonar.java.binaries=target/classes
ats-backend.sonar.java.source=21
ats-backend.sonar.coverage.jacoco.xmlReportPaths=target/site/jacoco/jacoco.xml
ats-backend.sonar.exclusions=**/target/**,**/*.jar

# ---------------------------------------------------------------------------
# ATS Frontend
# ---------------------------------------------------------------------------
ats-frontend.sonar.projectBaseDir=ats-frontend
ats-frontend.sonar.projectName=ATS Frontend
ats-frontend.sonar.sources=src/app
ats-frontend.sonar.test.inclusions=**/*.spec.ts
ats-frontend.sonar.exclusions=**/*.spec.ts,**/node_modules/**,**/dist/**
ats-frontend.sonar.coverage.exclusions=**/*.spec.ts,**/environments/environment*.ts,**/test-setup.ts,**/test-helpers.ts
ats-frontend.sonar.javascript.lcov.reportPaths=coverage/ats-frontend/lcov.info

# ---------------------------------------------------------------------------
# Ecommerce Backend
# ---------------------------------------------------------------------------
ecommerce-backend.sonar.projectBaseDir=ecommerce-backend
ecommerce-backend.sonar.projectName=Ecommerce Backend
ecommerce-backend.sonar.sources=src/main/java
ecommerce-backend.sonar.tests=src/test/java
ecommerce-backend.sonar.java.binaries=target/classes
ecommerce-backend.sonar.java.source=21
ecommerce-backend.sonar.coverage.jacoco.xmlReportPaths=target/site/jacoco/jacoco.xml
ecommerce-backend.sonar.exclusions=**/target/**,**/*.jar

# ---------------------------------------------------------------------------
# Ecommerce Frontend
# ---------------------------------------------------------------------------
ecommerce-frontend.sonar.projectBaseDir=ecommerce-frontend
ecommerce-frontend.sonar.projectName=Ecommerce Frontend
ecommerce-frontend.sonar.sources=src/app
ecommerce-frontend.sonar.test.inclusions=**/*.spec.ts
ecommerce-frontend.sonar.exclusions=**/*.spec.ts,**/node_modules/**,**/dist/**
ecommerce-frontend.sonar.coverage.exclusions=**/*.spec.ts,**/environments/environment*.ts,**/test-setup.ts,**/test-helpers.ts
ecommerce-frontend.sonar.javascript.lcov.reportPaths=coverage/angular-ecommerce/lcov.info

# ---------------------------------------------------------------------------
# Portfolio Backend
# ---------------------------------------------------------------------------
portfolio-backend.sonar.projectBaseDir=portfolio-backend
portfolio-backend.sonar.projectName=Portfolio Backend
portfolio-backend.sonar.sources=src/main/java
portfolio-backend.sonar.tests=src/test/java
portfolio-backend.sonar.java.binaries=target/classes
portfolio-backend.sonar.java.source=21
portfolio-backend.sonar.coverage.jacoco.xmlReportPaths=target/site/jacoco/jacoco.xml
portfolio-backend.sonar.exclusions=**/target/**,**/*.jar

# ---------------------------------------------------------------------------
# Portfolio Frontend
# ---------------------------------------------------------------------------
portfolio-frontend.sonar.projectBaseDir=portfolio-frontend
portfolio-frontend.sonar.projectName=Portfolio Frontend
portfolio-frontend.sonar.sources=src/app
portfolio-frontend.sonar.test.inclusions=**/*.spec.ts
portfolio-frontend.sonar.exclusions=**/*.spec.ts,**/node_modules/**,**/dist/**
portfolio-frontend.sonar.coverage.exclusions=**/*.spec.ts,**/environments/environment*.ts,**/test-setup.ts,**/test-helpers.ts
portfolio-frontend.sonar.javascript.lcov.reportPaths=coverage/portfolio-frontend/lcov.info
