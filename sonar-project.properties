sonar.projectKey=clark22134_MyPortfolioWebsite
sonar.organization=clark22134

# Project information
sonar.projectName=Portfolio Website
sonar.projectVersion=1.0

# Source code (exclude test files)
sonar.sources=portfolio-backend/src/main/java,portfolio-chatbot-backend/src/main/java,portfolio-frontend/src/app,ats-backend/src/main/java,ats-frontend/src/app,ecommerce-backend/src/main/java,ecommerce-frontend/src/app

# Test code
sonar.tests=portfolio-backend/src/test/java,portfolio-chatbot-backend/src/test/java,ats-backend/src/test/java,ecommerce-backend/src/test/java

# Test file patterns for frontend (spec files are tests within source directory)
sonar.test.inclusions=**/*.spec.ts

# Java settings
sonar.java.binaries=portfolio-backend/target/classes,portfolio-chatbot-backend/target/classes,ats-backend/target/classes,ecommerce-backend/target/classes
sonar.java.source=21

# Exclusions (exclude spec files from main sources, generated code, and build output)
# StreamLambdaHandler is AWS infrastructure glue (delegates to Spring container via
# the serverless-java-container adapter); it has no testable business logic and cannot
# be unit-tested without the full AWS Lambda runtime.
sonar.exclusions=**/*.spec.ts,**/node_modules/**,**/dist/**,**/target/**,**/*.jar,**/build-wrapper-dump.json,**/StreamLambdaHandler.java

# Coverage exclusions (justified: test helpers, Angular environment stubs, generated files,
# Spring @Configuration classes whose only content is @Bean factory methods)
sonar.coverage.exclusions=**/*.spec.ts,**/test/**,**/environments/environment*.ts,**/test-setup.ts,**/test-helpers.ts,**/StreamLambdaHandler.java,**/ChatbotConfig.java

# Java coverage - JaCoCo XML reports generated by mvn test in each backend module
sonar.coverage.jacoco.xmlReportPaths=portfolio-backend/target/site/jacoco/jacoco.xml,portfolio-chatbot-backend/target/site/jacoco/jacoco.xml,ats-backend/target/site/jacoco/jacoco.xml,ecommerce-backend/target/site/jacoco/jacoco.xml

# JavaScript/TypeScript coverage - LCOV reports generated by ng test --coverage in each frontend.
# Angular puts the file at coverage/<project-name>/lcov.info; these paths match
# what the CI restore step copies into each frontend's coverage/ directory.
sonar.javascript.lcov.reportPaths=portfolio-frontend/coverage/portfolio-frontend/lcov.info,ats-frontend/coverage/ats-frontend/lcov.info,ecommerce-frontend/coverage/angular-ecommerce/lcov.info
