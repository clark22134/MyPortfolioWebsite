# Production configuration for AWS Lambda
spring.application.name=ats-backend

# Database Configuration - Aurora Serverless v2 PostgreSQL
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:}

# Flyway-managed schema; JPA validates only.
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.open-in-view=false

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
# baseline-version=0 + baseline-on-migrate=true means: if the Aurora `ats`
# database already has tables from an earlier setup (no flyway_schema_history
# yet), Flyway records a baseline at V0 — so V1, V2, V3 all run cleanly the
# first time. Without an explicit baseline-version, Flyway baselines AT V1
# (the default) and silently skips V1, which leaves the schema half-applied
# if the existing tables don't match V1 exactly.
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=0
spring.flyway.baseline-description=Pre-Flyway baseline
# Tolerate manual fixes that get applied out of numeric order — safer for a
# small team where the next migration might be hot-fixed before an older one.
spring.flyway.out-of-order=true

# Connection Pool (HikariCP) - optimized for Lambda
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.connection-timeout=10000
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=600000

# CORS
app.cors.allowed-origins=https://ats.clarkfoster.com,https://clarkfoster.com

# File Upload
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=12MB
app.upload.resume-dir=/tmp/ats-uploads/resumes

# Actuator
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never

# Logging — surface Flyway + JPA schema validation errors clearly during the
# SnapStart pre-init phase so a failed deploy shows the exact cause in CloudWatch.
logging.level.root=INFO
logging.level.com.clarksprojects.ats=INFO
logging.level.org.springframework.web=INFO
logging.level.org.hibernate=WARN
logging.level.org.hibernate.tool.schema=INFO
logging.level.org.flywaydb=INFO
logging.level.com.amazonaws.serverless.proxy.spring=WARN
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} %-5level %logger{36} - %msg%n

# JWT — secret MUST be provided via environment in prod.
jwt.secret=${JWT_SECRET}
jwt.access.expiration=${JWT_ACCESS_EXPIRATION:900000}
jwt.refresh.expiration=${JWT_REFRESH_EXPIRATION:604800000}

# Cookie security: HTTPS-only and a parent domain so the SPA and API share cookies.
cookie.secure=true
cookie.domain=${COOKIE_DOMAIN:.clarkfoster.com}

# Demo accounts (default disabled in prod — flip to true for the public portfolio demo).
app.demo-accounts.enabled=${ATS_DEMO_ACCOUNTS_ENABLED:true}
app.demo-accounts.admin-password=${ATS_ADMIN_PASSWORD:admin123}
app.demo-accounts.recruiter-password=${ATS_RECRUITER_PASSWORD:recruiter123}
app.demo-accounts.manager-password=${ATS_MANAGER_PASSWORD:manager123}
