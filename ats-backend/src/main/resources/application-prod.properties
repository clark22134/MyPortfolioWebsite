# Production configuration for AWS Lambda
spring.application.name=ats-backend

# Database Configuration - Aurora Serverless v2 PostgreSQL
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.driver-class-name=org.postgresql.Driver
# Database credentials loaded from AWS Secrets Manager via environment
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:}

# JPA Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.open-in-view=false

# Connection Pool (HikariCP) - optimized for Lambda
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.connection-timeout=10000
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=600000

# CORS Configuration
app.cors.allowed-origins=https://ats.clarkfoster.com,https://clarkfoster.com

# File Upload Configuration
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=12MB
app.upload.resume-dir=/tmp/ats-uploads/resumes

# Actuator
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never

# Logging Configuration for CloudWatch
logging.level.root=INFO
logging.level.com.clarksprojects.ats=INFO
logging.level.org.springframework.web=INFO
logging.level.org.hibernate=WARN
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n
