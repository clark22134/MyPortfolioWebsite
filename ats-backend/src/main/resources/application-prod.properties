# Production configuration
spring.datasource.url=${POSTGRES_URL:jdbc:postgresql://localhost:5432/ats}
spring.datasource.username=${POSTGRES_USERNAME:atsapp}
spring.datasource.password=${POSTGRES_PASSWORD:atsapp}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.open-in-view=false

server.port=8080

## CORS
app.cors.allowed-origins=https://ats.clarkfoster.com,https://clarkfoster.com

management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never
