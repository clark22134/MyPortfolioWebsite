# Production configuration for AWS Lambda
spring.application.name=ats-backend

# Database Configuration - Aurora Serverless v2 PostgreSQL
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:}

# Flyway-managed schema; JPA validates only.
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.open-in-view=false

spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.locations=classpath:db/migration

# Connection Pool (HikariCP) - optimized for Lambda
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.connection-timeout=10000
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=600000

# CORS
app.cors.allowed-origins=https://ats.clarkfoster.com,https://clarkfoster.com

# File Upload
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=12MB
app.upload.resume-dir=/tmp/ats-uploads/resumes

# Actuator
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never

# Logging
logging.level.root=INFO
logging.level.com.clarksprojects.ats=INFO
logging.level.org.springframework.web=INFO
logging.level.org.hibernate=WARN
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n

# JWT — secret MUST be provided via environment in prod.
jwt.secret=${JWT_SECRET}
jwt.access.expiration=${JWT_ACCESS_EXPIRATION:900000}
jwt.refresh.expiration=${JWT_REFRESH_EXPIRATION:604800000}

# Cookie security: HTTPS-only and a parent domain so the SPA and API share cookies.
cookie.secure=true
cookie.domain=${COOKIE_DOMAIN:.clarkfoster.com}

# Demo accounts (default disabled in prod — flip to true for the public portfolio demo).
app.demo-accounts.enabled=${ATS_DEMO_ACCOUNTS_ENABLED:true}
app.demo-accounts.admin-password=${ATS_ADMIN_PASSWORD:admin123}
app.demo-accounts.recruiter-password=${ATS_RECRUITER_PASSWORD:recruiter123}
app.demo-accounts.manager-password=${ATS_MANAGER_PASSWORD:manager123}
