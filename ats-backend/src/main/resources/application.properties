spring.application.name=ats-backend

spring.datasource.url=jdbc:postgresql://localhost:5432/ats
spring.datasource.username=atsapp
spring.datasource.password=atsapp
spring.datasource.driver-class-name=org.postgresql.Driver

# Flyway manages the schema; JPA only validates that entities match the migrated tables.
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.open-in-view=false

spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.locations=classpath:db/migration

server.port=8080

# CORS
app.cors.allowed-origins=http://localhost:4200,http://localhost:8084

spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=12MB

app.upload.resume-dir=${user.home}/ats-uploads/resumes

management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never

# JWT — 15 min access token, 7 day refresh token. Override the secret in deployment.
jwt.secret=${JWT_SECRET:dev-secret-change-me-32-bytes-minimum-for-hmac-sha256-keys}
jwt.access.expiration=900000
jwt.refresh.expiration=604800000

# Cookie security defaults (dev: insecure HTTP cookies; override in prod).
cookie.secure=false
cookie.domain=

# Demo accounts (seeded on startup). Disable in production by setting app.demo-accounts.enabled=false.
app.demo-accounts.enabled=true
app.demo-accounts.admin-password=${ATS_ADMIN_PASSWORD:admin123}
app.demo-accounts.recruiter-password=${ATS_RECRUITER_PASSWORD:recruiter123}
app.demo-accounts.manager-password=${ATS_MANAGER_PASSWORD:manager123}
