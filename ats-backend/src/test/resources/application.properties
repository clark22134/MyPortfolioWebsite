# Tests use an in-memory H2 database with Hibernate's create-drop so the
# Postgres-specific Flyway migrations don't run.
spring.datasource.url=jdbc:h2:mem:ats-test;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;MODE=PostgreSQL
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.open-in-view=false

spring.flyway.enabled=false

jwt.secret=test-secret-not-for-production-use-32-bytes-minimum-required
jwt.access.expiration=900000
jwt.refresh.expiration=604800000
cookie.secure=false
cookie.domain=

# Disable the demo-account seeder during unit/web-mvc tests to keep slices fast.
app.demo-accounts.enabled=false
app.demo-accounts.admin-password=test-admin
app.demo-accounts.recruiter-password=test-recruiter
app.demo-accounts.manager-password=test-manager

# Talent pool initializer needs an in-memory DB; tests that touch it run with full @SpringBootTest.
app.upload.resume-dir=${java.io.tmpdir}/ats-test-uploads
