<app-kali-terminal-loader></app-kali-terminal-loader>

<div
  [class.content-hidden]="!terminalComplete"
  [class.content-visible]="terminalComplete"
  [class.shared-cyber-layout]="!isHomeRoute"
>
  @if (!isHomeRoute) {
    <app-cursor-trail></app-cursor-trail>

    <div class="shared-cyber-background" aria-hidden="true">
      <app-cyber-network-background></app-cyber-network-background>
    </div>
  }

  <app-nav></app-nav>

  <main id="main-content" role="main" tabindex="-1" aria-label="Main content">
    <router-outlet></router-outlet>
  </main>

  <!-- Footer with contentinfo landmark -->
  <app-footer></app-footer>

  <!-- Accessibility Toolbar (persistent across all pages) -->
  <app-accessibility-toolbar></app-accessibility-toolbar>

  <!-- Floating portfolio AI assistant (RAG chatbot) -->
  <app-chatbot-launcher></app-chatbot-launcher>
</div>
