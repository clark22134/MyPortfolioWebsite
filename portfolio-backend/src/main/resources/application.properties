spring.application.name=portfolio-backend
server.port=8080

# The Spring AI OpenAI starter transitively pulls in spring-boot-starter-webflux
# (it uses WebClient under the hood). Without this property, Spring Boot sees
# both servlet and reactive web stacks on the classpath and tries to
# auto-configure both — which causes BeanDefinitionOverrideException for
# `springSecurityFilterChain`, `requestDataValueProcessor`, etc. We are a
# servlet/MVC app, so pin the web application type explicitly.
spring.main.web-application-type=servlet

# Database Configuration (H2 for development)
spring.datasource.url=jdbc:h2:mem:portfoliodb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
# SECURITY: H2 console disabled by default - enable only for local development
spring.h2.console.enabled=${H2_CONSOLE_ENABLED:false}
spring.h2.console.path=/h2-console

# JPA Configuration
spring.jpa.hibernate.ddl-auto=update
# SECURITY: SQL logging disabled in production to prevent sensitive data exposure
spring.jpa.show-sql=${SHOW_SQL:false}

# JWT Configuration
# SECURITY: JWT_SECRET environment variable is REQUIRED - no fallback to prevent weak secrets in production
jwt.secret=${JWT_SECRET}
# Access token: 15 minutes (short-lived for security)
jwt.access.expiration=900000
# Refresh token: 7 days (stored in database, can be revoked)
jwt.refresh.expiration=604800000
# Maximum active refresh tokens per user (prevents unlimited device sessions)
jwt.refresh.max-per-user=5

# Cookie Configuration
cookie.secure=${COOKIE_SECURE:true}
cookie.domain=${COOKIE_DOMAIN:}

# CSRF Configuration
csrf.enabled=${CSRF_ENABLED:true}

# CORS Configuration
cors.allowed.origins=http://localhost,http://localhost:4200,http://localhost:3000,https://clarkfoster.com,https://www.clarkfoster.com

# Actuator Configuration
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=always

# Application Version
app.version=1.0.0
app.commit=${GIT_COMMIT:unknown}

# Email Configuration
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000

# Contact Email Configuration
contact.email.to=${CONTACT_EMAIL:clark@clarkfoster.com}
contact.email.from=${CONTACT_FROM_EMAIL:noreply@clarkfoster.com}

# ===========================================================================
# Portfolio Chatbot (RAG) Configuration
# ===========================================================================
# The chatbot is auto-disabled if OPENAI_API_KEY is missing — the rest of
# the application starts normally and /api/chatbot returns 503.
chatbot.enabled=${CHATBOT_ENABLED:true}
chatbot.docs.path=${CHATBOT_DOCS_PATH:docs}
chatbot.rate-limit.per-minute=${CHATBOT_RATE_LIMIT_PER_MIN:20}
chatbot.refresh.ms=${CHATBOT_REFRESH_MS:600000}

# Spring AI / OpenAI
spring.ai.openai.api-key=${OPENAI_API_KEY:}
spring.ai.openai.chat.options.model=${OPENAI_CHAT_MODEL:gpt-4o-mini}
spring.ai.openai.chat.options.temperature=${OPENAI_CHAT_TEMPERATURE:0.2}
spring.ai.openai.embedding.options.model=${OPENAI_EMBEDDING_MODEL:text-embedding-3-small}
# Disable Spring AI auto-config when no key is present so startup never fails.
spring.ai.model.chat=${SPRING_AI_MODEL_CHAT:openai}
spring.ai.model.embedding=${SPRING_AI_MODEL_EMBEDDING:openai}
# Explicitly disable the optional OpenAI models we don't use. Without these,
# the OpenAI starter eagerly instantiates OpenAiAudioSpeechModel /
# OpenAiAudioTranscriptionModel / OpenAiImageModel / OpenAiModerationModel at
# context refresh, which fails (and crashes the Lambda's SnapStart pre-snapshot
# init) whenever spring.ai.openai.api-key is empty.
spring.ai.model.audio.speech=none
spring.ai.model.audio.transcription=none
spring.ai.model.image=none
spring.ai.model.moderation=none

