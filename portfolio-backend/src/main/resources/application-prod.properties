# Production configuration for AWS Lambda
spring.application.name=portfolio-backend

# Database Configuration - Aurora Serverless v2 PostgreSQL
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.driver-class-name=org.postgresql.Driver
# Database credentials loaded from AWS Secrets Manager via environment
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:}

# JPA Configuration
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

# Connection Pool (HikariCP) - optimized for Lambda
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.connection-timeout=10000
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=600000

# JWT Configuration
jwt.secret=${JWT_SECRET}
jwt.access.expiration=900000
jwt.refresh.expiration=604800000
jwt.refresh.max-per-user=5

# Cookie Configuration
cookie.secure=true
cookie.domain=.clarkfoster.com

# CSRF Configuration
csrf.enabled=true

# CORS Configuration
cors.allowed.origins=https://clarkfoster.com,https://www.clarkfoster.com

# Actuator Configuration
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=always

# Application Version
app.version=1.0.0
app.commit=${GIT_COMMIT:unknown}

# Email Configuration - AWS SES SMTP via VPC endpoint
spring.mail.host=${MAIL_HOST:email-smtp.us-east-1.amazonaws.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000

# Logging Configuration for CloudWatch
logging.level.root=INFO
logging.level.com.portfolio.backend=INFO
logging.level.org.springframework.web=INFO
logging.level.org.hibernate=WARN
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n
