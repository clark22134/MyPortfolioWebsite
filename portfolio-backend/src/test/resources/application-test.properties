# Test Configuration
spring.application.name=portfolio-backend-test

# Database Configuration (H2 in-memory for tests)
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.h2.console.enabled=false

# JPA Configuration
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false

# JWT Configuration - Test secret (only for testing)
jwt.secret=TestSecretKeyForJWTTokenGenerationAndValidation2024TestSecretKeyForJWTTokenGeneration
jwt.access.expiration=900000
jwt.refresh.expiration=604800000
jwt.refresh.max-per-user=5

# Cookie Configuration - disable secure for testing
cookie.secure=false
cookie.domain=

# CSRF Configuration - disable for tests
csrf.enabled=false

# Disable email for tests
spring.mail.host=localhost
spring.mail.port=25
spring.mail.username=test
spring.mail.password=test

# Chatbot / Spring AI - disabled for tests. Provide a dummy API key and turn
# off the optional Spring AI model auto-configurations (audio/image/etc.) so
# the OpenAI starter does not fail context loads when no real key is set.
chatbot.enabled=false
spring.ai.openai.api-key=test-key
spring.ai.model.chat=none
spring.ai.model.embedding=none
spring.ai.model.audio.speech=none
spring.ai.model.audio.transcription=none
spring.ai.model.image=none
spring.ai.model.moderation=none
