<svg xmlns="http://www.w3.org/2000/svg" viewBox="8 8 48 48">
  <defs>
    <linearGradient id="g1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7ef9ff"/>
      <stop offset="50%" stop-color="#19d3ff"/>
      <stop offset="100%" stop-color="#2563ff"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="1.2" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <g fill="none" stroke="url(#g1)" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round" filter="url(#glow)">

