             Q24 17 30 17
             Q36 17 36 22"/>

    <!-- CF mark -->
    <path d="M36 25
             Q31 23 27 25
             Q23 27 23 31
             Q23 36 28 38
             Q32 39 36 36"/>
    <path d="M26 26 V37
             M26 26 H35
             M26 31 H33"/>
  </g>

  <!-- sparkle -->
  <g fill="#7ef9ff">
    <circle cx="40" cy="18" r="1.5"/>
