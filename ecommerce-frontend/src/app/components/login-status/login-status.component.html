<div class="login-status" role="status" aria-label="Login status">
  @if (authService.isAuthenticated()) {
    <span class="user-email" [title]="authService.userEmail()">{{ authService.userEmail() }}</span>
    <a routerLink="/order-history" class="btn-orders" aria-label="View order history">Orders</a>
    <button class="btn-logout" (click)="logout()" aria-label="Log out of your account">Logout</button>
  } @else {
    <button type="button" class="btn-profile" (click)="goToLogin()"
            aria-label="Log in to your account" title="Log in">
      <svg class="profile-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"
           fill="none" stroke="currentColor" stroke-width="1.8"
           stroke-linecap="round" stroke-linejoin="round" aria-hidden="true" focusable="false">
        <circle cx="12" cy="8" r="4"></circle>
        <path d="M4 21c0-4.4 3.6-8 8-8s8 3.6 8 8"></path>
      </svg>
    </button>
  }
</div>
