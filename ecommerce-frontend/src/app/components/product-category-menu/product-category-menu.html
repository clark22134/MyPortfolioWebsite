<div class="menu-sidebar-content js-scrollbar1">
  <nav class="navbar-sidebar" aria-label="Product categories">
    <button class="category-header" (click)="toggleCategories()" [attr.aria-expanded]="categoriesExpanded()" aria-controls="category-list" type="button">
      <div class="category-header-label">
        <i class="fa fa-th-large" aria-hidden="true"></i>
        <span>Product Categories</span>
      </div>
      <i class="fa fa-chevron-down category-chevron" [class.collapsed]="!categoriesExpanded()" aria-hidden="true"></i>
    </button>
    <ul id="category-list" class="list-unstyled navbar-list" [class.expanded]="categoriesExpanded()" role="list">
      @for (category of productCategories(); track category.id) {
        <li role="listitem">
          <a [routerLink]="['/category', category.id]" routerLinkActive="active-link">
            {{ category.categoryName }}
          </a>
        </li>
      }
    </ul>
  </nav>
</div>
