<nav class="category-nav" aria-label="Product categories">
  <div class="category-nav-label">
    <i class="fa fa-th-large" aria-hidden="true"></i>
    <span>Shop by category</span>
  </div>

  <ul id="category-list" class="list-unstyled category-list" role="list">
    <li role="listitem">
      <a routerLink="/products" routerLinkActive="active-link" [routerLinkActiveOptions]="{ exact: true }">
        All Products
      </a>
    </li>
    @for (category of productCategories(); track category.id) {
      <li role="listitem">
        <a [routerLink]="['/category', category.id]" routerLinkActive="active-link">
          {{ category.categoryName }}
        </a>
      </li>
    }
  </ul>
</nav>
