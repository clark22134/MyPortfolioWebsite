<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Fosterly - Angular, Spring</title>
  <base href="/">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Fosterly - Full-stack ecommerce application built with Angular and Spring Boot.">
  <link rel="icon" type="image/x-icon" href="fosterly_shopping_favicon.svg?v=2">
  <style>
    html, body { background: #080c14; margin: 0; padding: 0; }
    img { max-width: 100%; height: auto; }
    .page-wrapper { opacity: 0; animation: pageReveal .3s ease forwards; }
    @keyframes pageReveal { to { opacity: 1; } }
  </style>
</head>
<body>
  <!-- Skip Navigation Link (WCAG 2.4.1) -->
  <a href="#main-content" class="skip-to-main">Skip to main content</a>

  <!-- ARIA Live Regions for screen reader announcements -->
  <div id="aria-live-polite" aria-live="polite" aria-atomic="true" role="status" class="sr-only"></div>
  <div id="aria-live-assertive" aria-live="assertive" aria-atomic="true" role="alert" class="sr-only"></div>

  <app-root>
    <style>@keyframes _lr{to{transform:rotate(360deg)}}</style>
    <div style="display:flex;justify-content:center;align-items:center;height:100vh;background:#080c14;">
      <div style="width:40px;height:40px;border:3px solid rgba(0,229,255,0.2);border-top-color:#00e5ff;border-radius:50%;animation:_lr .8s linear infinite;"></div>
    </div>
  </app-root>
</body>
</html>
