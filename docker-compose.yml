version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    env_file:
      - .env
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - CONTACT_EMAIL=clark@clarkfoster.com
    networks:
      - portfolio-network
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "4200:80"
    volumes:
      # Override with local nginx config for development
      - ./frontend/nginx.local.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
    networks:
      - portfolio-network
    restart: unless-stopped

  # E-Commerce Services
  ecommerce-db:
    build:
      context: ./ecommerce-db
      dockerfile: Dockerfile
    environment:
      - MYSQL_DATABASE=${MYSQL_DATABASE:-full-stack-ecommerce}
      - MYSQL_USER=${MYSQL_USER:-ecommerceapp}
      - MYSQL_PASSWORD=${MYSQL_PASSWORD:?Set MYSQL_PASSWORD in .env}
      - MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD:?Set MYSQL_ROOT_PASSWORD in .env}
    ports:
      - "3307:3306"
    networks:
      - portfolio-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 10

  ecommerce-backend:
    build:
      context: ./ecommerce-backend
      dockerfile: Dockerfile
    ports:
      - "8081:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - MYSQL_URL=${ECOMMERCE_MYSQL_URL:-jdbc:mysql://ecommerce-db:3306/full-stack-ecommerce?useSSL=false&useUnicode=yes&characterEncoding=UTF-8&allowPublicKeyRetrieval=true&serverTimezone=UTC}
      - MYSQL_USERNAME=${ECOMMERCE_MYSQL_USERNAME:-ecommerceapp}
      - MYSQL_PASSWORD=${MYSQL_PASSWORD:?Set MYSQL_PASSWORD in .env}
      - ECOMMERCE_JWT_SECRET=${ECOMMERCE_JWT_SECRET:-}
    depends_on:
      ecommerce-db:
        condition: service_healthy
    networks:
      - portfolio-network
    restart: unless-stopped

  ecommerce-frontend:
    build:
      context: ./ecommerce-frontend
      dockerfile: Dockerfile
    ports:
      - "8082:80"
    volumes:
      # Override with local nginx config for development
      - ./ecommerce-frontend/nginx.local.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - ecommerce-backend
    networks:
      - portfolio-network
    restart: unless-stopped

  # ATS (Applicant Tracking System) Services
  ats-db:
    build:
      context: ./ats-db
      dockerfile: Dockerfile
    environment:
      - POSTGRES_DB=${POSTGRES_DB:-ats}
      - POSTGRES_USER=${POSTGRES_USER:-atsapp}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
    ports:
      - "5434:5432"
    networks:
      - portfolio-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U atsapp -d ats"]
      interval: 10s
      timeout: 5s
      retries: 10

  ats-backend:
    build:
      context: ./ats-backend
      dockerfile: Dockerfile
    ports:
      - "8083:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - POSTGRES_URL=${ATS_POSTGRES_URL:-jdbc:postgresql://ats-db:5432/ats}
      - POSTGRES_USERNAME=${ATS_POSTGRES_USERNAME:-atsapp}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
    depends_on:
      ats-db:
        condition: service_healthy
    networks:
      - portfolio-network
    restart: unless-stopped

  ats-frontend:
    build:
      context: ./ats-frontend
      dockerfile: Dockerfile
    ports:
      - "8084:80"
    volumes:
      # Override with local nginx config for development
      - ./ats-frontend/nginx.local.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - ats-backend
    networks:
      - portfolio-network
    restart: unless-stopped

networks:
  portfolio-network:
    driver: bridge
