spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.url=jdbc:mysql://localhost:3306/full-stack-ecommerce?useSSL=false&useUnicode=yes&characterEncoding=UTF-8&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=ecommerceapp
spring.datasource.password=ecommerceapp

spring.data.rest.base-path=/api
spring.jpa.open-in-view=false

## CORS
app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:https://localhost:4200,http://localhost:4200,https://shop.clarkfoster.com,http://localhost}

## JWT Authentication
# Local/dev placeholder ONLY — deliberately not a real secret (decodes to
# "local-dev-only-not-a-real-secret-change-me-in-deployment"). Production sets
# ECOMMERCE_JWT_SECRET via the prod profile with no fallback. The value must be
# Base64 (JwtUtils Base64-decodes it) and >= 32 bytes for HMAC-SHA256.
app.jwt.secret=${ECOMMERCE_JWT_SECRET:bG9jYWwtZGV2LW9ubHktbm90LWEtcmVhbC1zZWNyZXQtY2hhbmdlLW1lLWluLWRlcGxveW1lbnQ=}
app.jwt.expiration-ms=3600000

## Cookie Security
app.cookie.secure=false
app.cookie.same-site=Lax

## Local dev server — plain HTTP. No keystore is committed to the repo; TLS is
## terminated upstream in production (API Gateway / CloudFront). The frontend
## dev proxy targets http://localhost:8443.
server.port=8443