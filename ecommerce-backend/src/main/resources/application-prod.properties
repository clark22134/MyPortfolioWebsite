# Production configuration for AWS Lambda
spring.application.name=ecommerce-backend

# Database Configuration - Aurora Serverless v2 PostgreSQL (migrated from MySQL)
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.driver-class-name=org.postgresql.Driver
# Database credentials loaded from AWS Secrets Manager via environment
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:}

# JPA Configuration
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=10000
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=600000

spring.data.rest.base-path=/api
spring.jpa.open-in-view=false
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# CORS Configuration
app.cors.allowed-origins=https://shop.clarkfoster.com

# JWT Authentication
app.jwt.secret=${ECOMMERCE_JWT_SECRET}
app.jwt.expiration-ms=3600000

# Cookie Security
app.cookie.secure=true
app.cookie.same-site=Strict

# Actuator
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never

# Logging Configuration for CloudWatch
logging.level.root=INFO
logging.level.com.clarksprojects.ecommerce=INFO
logging.level.org.springframework.web=INFO
logging.level.org.hibernate=WARN
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n
