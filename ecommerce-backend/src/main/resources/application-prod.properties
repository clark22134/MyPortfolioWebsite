# Production configuration - overrides application.properties
# Database (environment variables set by ECS task definition)
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.url=${MYSQL_URL:jdbc:mysql://localhost:3306/full-stack-ecommerce?useSSL=false&useUnicode=yes&characterEncoding=UTF-8&allowPublicKeyRetrieval=true&serverTimezone=UTC}
spring.datasource.username=${MYSQL_USERNAME:ecommerceapp}
spring.datasource.password=${MYSQL_PASSWORD:ecommerceapp}

# HikariCP connection pool settings - retry logic for database startup
spring.datasource.hikari.connection-timeout=60000
spring.datasource.hikari.initialization-fail-timeout=120000
spring.datasource.hikari.connection-test-query=SELECT 1
spring.datasource.hikari.validation-timeout=5000
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2

# JPA settings - defer initialization to allow database startup
spring.jpa.defer-datasource-initialization=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

spring.data.rest.base-path=/api
spring.jpa.open-in-view=false

# JWT Authentication
app.jwt.secret=${ECOMMERCE_JWT_SECRET}
app.jwt.expiration-ms=3600000

# Cookie Security
app.cookie.secure=true
app.cookie.same-site=Strict

# Production: plain HTTP (ALB handles SSL termination)
server.port=8080
server.ssl.enabled=false

# Health check endpoint
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never
