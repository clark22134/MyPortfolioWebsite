version: 2
updates:
  # Frontend npm dependencies
  - package-ecosystem: "npm"
    directory: "/portfolio-frontend"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    groups:
      all-dependencies:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"
      major-updates:
        patterns:
          - "*"
        update-types:
          - "major"
    commit-message:
      prefix: "chore(deps)"

  - package-ecosystem: "npm"
    directory: "/ats-frontend"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
