name: Pull Request Validation

on:
  pull_request:
    types: [opened, synchronize, reopened]

concurrency:
  group: pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  pr-checks:
    name: PR Quality Checks
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Label PR
        uses: actions/labeler@v6
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}

  security-scan:
    name: Security Scan
    permissions:
      security-events: write
      contents: read
    uses: ./.github/workflows/reusable-security.yml
    secrets: inherit

  test-backend:
    name: Backend Tests
    uses: ./.github/workflows/reusable-test.yml
    with:
      component: portfolio-backend
      type: java

  test-frontend:
    name: Frontend Tests
    uses: ./.github/workflows/reusable-test.yml
    with:
      component: portfolio-frontend
      type: node
      node-test-args: '--no-watch --code-coverage --browsers=ChromeHeadless'

  test-ats-backend:
    name: ATS Backend Tests
    uses: ./.github/workflows/reusable-test.yml
    with:
      component: ats-backend
      type: java

  test-ats-frontend:
    name: ATS Frontend Tests
    uses: ./.github/workflows/reusable-test.yml
    with:
      component: ats-frontend
      type: node

  test-ecommerce-backend:
    name: Ecommerce Backend Tests
    uses: ./.github/workflows/reusable-test.yml
    with:
      component: ecommerce-backend
      type: java

  test-ecommerce-frontend:
    name: Ecommerce Frontend Tests
    uses: ./.github/workflows/reusable-test.yml
    with:
      component: ecommerce-frontend
      type: node

  accessibility-test:
    name: Accessibility (WCAG 2.1 AA)
    needs: [test-frontend]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'portfolio-frontend/package-lock.json'

      - name: Install dependencies
        run: cd portfolio-frontend && npm ci

      - name: Download frontend build
        uses: actions/download-artifact@v6
        with:
          name: portfolio-frontend-dist
          path: portfolio-frontend/dist

      - name: Serve and run accessibility tests
        run: |
          cd portfolio-frontend
          npx http-server dist/portfolio-frontend/browser -p 4200 -s --proxy http://localhost:4200? &
          sleep 5
          npm run test:a11y
        env:
          BASE_URL: http://localhost:4200

  dependency-audit:
    name: Dependency Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-java@v5
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: maven

      - name: npm audit (frontend)
        run: cd portfolio-frontend && npm audit --audit-level=moderate || true

      - name: npm audit (ats-frontend)
        run: cd ats-frontend && npm audit --audit-level=moderate || true

      - name: npm audit (ecommerce-frontend)
        run: cd ecommerce-frontend && npm audit --audit-level=moderate || true

      - name: Maven dependency check (backend)
        run: cd portfolio-backend && mvn dependency-check:check -DfailBuildOnCVSS=7 || true

      - name: Maven dependency check (ats-backend)
        run: cd ats-backend && mvn dependency-check:check -DfailBuildOnCVSS=7 || true

      - name: Maven dependency check (ecommerce-backend)
        run: cd ecommerce-backend && mvn dependency-check:check -DfailBuildOnCVSS=7 || true

  auto-review:
    name: Automated Code Review
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v6

      - name: Run PR Review
        uses: coderabbitai/ai-pr-reviewer@latest
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        with:
          debug: false
          review_simple_changes: false
          review_comment_lgtm: false
