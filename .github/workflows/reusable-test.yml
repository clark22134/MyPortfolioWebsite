name: Reusable Test Workflow

on:
  workflow_call:
    inputs:
      component:
        required: true
        type: string
        description: 'Component directory to test (e.g., backend, ats-frontend)'
      type:
        required: true
        type: string
        description: 'Component type: java or node'
      node-test-args:
        required: false
        type: string
        default: ''
        description: 'Extra args appended to npm test -- --watch=false (Node projects only)'

jobs:
  test:
    name: Test ${{ inputs.component }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      # ── Java setup ───────────────────────────────────────────────
      - name: Set up JDK 21
        if: inputs.type == 'java'
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Test & Build (Java)
        if: inputs.type == 'java'
        run: |
          cd ${{ inputs.component }}
          mvn clean test
          mvn package -DskipTests

      - name: Generate JaCoCo Report
        if: inputs.type == 'java'
        run: cd ${{ inputs.component }} && mvn jacoco:report
        continue-on-error: true

      # ── Node setup ──────────────────────────────────────────────
      - name: Set up Node.js
        if: inputs.type == 'node'
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: '${{ inputs.component }}/package-lock.json'

      - name: Install dependencies (Node)
        if: inputs.type == 'node'
        run: cd ${{ inputs.component }} && npm ci

      - name: Lint (Node)
        if: inputs.type == 'node'
        run: cd ${{ inputs.component }} && npm run lint
        continue-on-error: true

      - name: Test (Node)
        if: inputs.type == 'node'
        run: cd ${{ inputs.component }} && npm test -- --watch=false ${{ inputs.node-test-args }}

      - name: Build (Node)
        if: inputs.type == 'node'
        run: cd ${{ inputs.component }} && npm run build -- --configuration production

      # ── Artifacts ───────────────────────────────────────────────
      - name: Upload Java Artifact
        if: inputs.type == 'java'
        uses: actions/upload-artifact@v7
        with:
          name: ${{ inputs.component }}-jar
          path: ${{ inputs.component }}/target/*.jar
          retention-days: 1

      - name: Upload Node Artifact
        if: inputs.type == 'node'
        uses: actions/upload-artifact@v7
        with:
          name: ${{ inputs.component }}-dist
          path: ${{ inputs.component }}/dist/
          retention-days: 1

      - name: Upload Coverage
        if: always()
        uses: codecov/codecov-action@v6
        with:
          files: ${{ inputs.type == 'java' && format('{0}/target/site/jacoco/jacoco.xml', inputs.component) || format('{0}/coverage/lcov.info', inputs.component) }}
          flags: ${{ inputs.component }}
          name: ${{ inputs.component }}-coverage
        continue-on-error: true
