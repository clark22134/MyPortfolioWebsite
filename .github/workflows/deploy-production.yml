name: Deploy to Production

on:
  push:
    branches: [main]

# Serialize production deployments — queue, never cancel in-progress
concurrency:
  group: deploy-production
  cancel-in-progress: false

env:
  AWS_REGION: us-east-1

jobs:
  # ── Quality gates (all run in parallel) ──────────────────────────
  security:
    name: Security Scan
    permissions:
      security-events: write
      contents: read
    uses: ./.github/workflows/reusable-security.yml

  code-quality:
    name: Code Quality (SonarCloud)
    runs-on: ubuntu-latest
    # Must wait for all test jobs so coverage artifacts are available before the scan
    needs: [test-backend, test-chatbot-backend, test-frontend, test-ats-backend, test-ats-frontend, test-ecommerce-backend, test-ecommerce-frontend]
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Compile backends for analysis
        run: |
          cd portfolio-backend && mvn compile -DskipTests -q
          cd ../portfolio-chatbot-backend && mvn compile -DskipTests -q
          cd ../ats-backend && mvn compile -DskipTests -q
          cd ../ecommerce-backend && mvn compile -DskipTests -q

      - name: Download JaCoCo coverage reports
        uses: actions/download-artifact@v8
        with:
          pattern: '*-jacoco'
          merge-multiple: false
        continue-on-error: true

      - name: Restore JaCoCo reports to expected paths
        run: |
          for component in portfolio-backend portfolio-chatbot-backend ats-backend ecommerce-backend; do
            artifact_dir="${component}-jacoco"
            if [ -f "${artifact_dir}/jacoco.xml" ]; then
              mkdir -p "${component}/target/site/jacoco"
              cp "${artifact_dir}/jacoco.xml" "${component}/target/site/jacoco/jacoco.xml"
              echo "Restored ${component} JaCoCo report"
            else
              echo "No JaCoCo report found for ${component}"
            fi
          done

      - name: Download LCOV coverage reports
        uses: actions/download-artifact@v8
        with:
          pattern: '*-lcov'
          merge-multiple: false
        continue-on-error: true

      - name: Restore LCOV reports to expected paths
        run: |
          # Each frontend's coverage/ dir is uploaded wholesale; restore it back.
          # Angular puts the lcov under coverage/<project-name>/lcov.info, which
          # is what sonar-project.properties references for each module.
          for component in portfolio-frontend ats-frontend ecommerce-frontend; do
            artifact_dir="${component}-lcov"
            if [ -d "${artifact_dir}" ]; then
              mkdir -p "${component}/coverage"
              cp -r "${artifact_dir}/." "${component}/coverage/"
              echo "Restored ${component} LCOV reports:"
              find "${component}/coverage" -name 'lcov.info'
            else
              echo "No LCOV artifact found for ${component}"
            fi
          done

      - name: SonarCloud Scan
        uses: SonarSource/sonarqube-scan-action@v8
        with:
          # Pin to a scanner version that's fully propagated on the SonarSource
          # CDN. The action's default ("latest") pulled 8.0.1.6346 which was
          # returning intermittent 403s from CloudFront edges right after
          # release. Bump deliberately when a newer version has stabilised.
          scannerVersion: 7.2.0.5079
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

      - name: SonarCloud Quality Gate
        uses: SonarSource/sonarqube-quality-gate-action@v1
        timeout-minutes: 5
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  test-backend:
    name: Backend Tests
    uses: ./.github/workflows/reusable-test.yml
    with:
      component: portfolio-backend
      type: java

  test-chatbot-backend:
    name: Chatbot Backend Tests
    uses: ./.github/workflows/reusable-test.yml
    with:
      component: portfolio-chatbot-backend
      type: java

  test-frontend:
    name: Frontend Tests
    uses: ./.github/workflows/reusable-test.yml
    with:
      component: portfolio-frontend
      type: node

  test-ats-backend:
    name: ATS Backend Tests
    uses: ./.github/workflows/reusable-test.yml
    with:
      component: ats-backend
      type: java

  test-ats-frontend:
    name: ATS Frontend Tests
    uses: ./.github/workflows/reusable-test.yml
    with:
      component: ats-frontend
      type: node

  test-ecommerce-backend:
    name: Ecommerce Backend Tests
    uses: ./.github/workflows/reusable-test.yml
    with:
      component: ecommerce-backend
      type: java

  test-ecommerce-frontend:
    name: Ecommerce Frontend Tests
    uses: ./.github/workflows/reusable-test.yml
    with:
      component: ecommerce-frontend
      type: node

  # ── Infrastructure ───────────────────────────────────────────────
  deploy-infrastructure:
    name: Deploy Infrastructure (Terraform)
    runs-on: ubuntu-latest
    needs: [test-backend, test-chatbot-backend, test-frontend, test-ats-backend, test-ats-frontend, test-ecommerce-backend, test-ecommerce-frontend, code-quality, security]
    environment:
      name: production
    permissions:
      id-token: write
      contents: read
    defaults:
      run:
        working-directory: terraform
    env:
      TF_VAR_ses_smtp_username: ${{ secrets.SES_SMTP_USERNAME }}
      TF_VAR_ses_smtp_password: ${{ secrets.SES_SMTP_PASSWORD }}
      TF_VAR_ecommerce_jwt_secret: ${{ secrets.ECOMMERCE_JWT_SECRET }}
      TF_VAR_portfolio_jwt_secret: ${{ secrets.PORTFOLIO_JWT_SECRET }}
      # Required — without this, the ATS Lambda's JwtUtil @PostConstruct
      # cannot resolve ${JWT_SECRET} and SnapStart init fails.
      TF_VAR_ats_jwt_secret: ${{ secrets.ATS_JWT_SECRET }}
      TF_VAR_admin_password: ${{ secrets.ADMIN_PASSWORD }}
      # Required for prod chatbot Lambda configuration.
      TF_VAR_openai_api_key: ${{ secrets.OPENAI_API_KEY }}
      TF_VAR_aws_region: us-east-1
      # RDS IAM auth cutover for portfolio-backend: switches it to IAM token auth
      # and removes its plaintext DB_PASSWORD. The portfolio_app role must already
      # exist (see terraform/RDS_IAM_AUTH_RUNBOOK.md). Plain literal, not a secret.
      TF_VAR_portfolio_db_iam_auth: "true"
      # RDS IAM auth cutover for ecommerce-backend: same mechanism. The ecommerce_app
      # role (LOGIN + rds_iam + DML on all public tables) is already provisioned.
      # Plain literal, not a secret.
      TF_VAR_ecommerce_db_iam_auth: "true"
      # RDS IAM auth cutover for ats-backend (last app). The ats_app role is
      # provisioned: LOGIN + rds_iam, CONNECT, USAGE+CREATE on public, and it OWNS
      # all app tables/sequences (REASSIGN OWNED) so Flyway can run DDL as ats_app.
      # Plain literal, not a secret.
      TF_VAR_ats_db_iam_auth: "true"
    steps:
      - uses: actions/checkout@v6

      - uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-east-1

      - uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: 1.15.5
          terraform_wrapper: false

      - name: Verify OPENAI_API_KEY is available
        run: |
          if [ -z "${TF_VAR_openai_api_key}" ]; then
            echo "::error::OPENAI_API_KEY is empty or unavailable in deploy-infrastructure. Ensure it is set for the production environment or repository secrets."
            exit 1
          fi

      - name: Terraform Init
        run: terraform init

      - name: Clear stale Terraform locks
        run: |
          LOCK_INFO=$(aws dynamodb get-item \
            --table-name portfolio-terraform-locks \
            --key '{"LockID": {"S": "clarkfoster-portfolio-tf-state-use1/portfolio/terraform.tfstate"}}' \
            --region us-east-1 --output json 2>/dev/null || echo '{}')

          if [ "$LOCK_INFO" != "{}" ] && [ "$(echo $LOCK_INFO | jq -r '.Item')" != "null" ]; then
            LOCK_CREATED=$(echo $LOCK_INFO | jq -r '.Item.Info.S' | jq -r '.Created' 2>/dev/null || echo "")
            if [ -n "$LOCK_CREATED" ]; then
              LOCK_AGE=$(( $(date +%s) - $(date -d "$LOCK_CREATED" +%s 2>/dev/null || echo "0") ))
              echo "Lock age: ${LOCK_AGE}s"
              if [ $LOCK_AGE -gt 1800 ]; then
                echo "Stale lock (>30 min), clearing..."
                aws dynamodb delete-item \
                  --table-name portfolio-terraform-locks \
                  --key '{"LockID": {"S": "clarkfoster-portfolio-tf-state-use1/portfolio/terraform.tfstate"}}' \
                  --region us-east-1
              fi
            else
              echo "Cannot parse lock timestamp, clearing..."
              aws dynamodb delete-item \
                --table-name portfolio-terraform-locks \
                --key '{"LockID": {"S": "clarkfoster-portfolio-tf-state-use1/portfolio/terraform.tfstate"}}' \
                --region us-east-1
            fi
          else
            echo "No existing lock found"
          fi

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Plan
        id: plan
        run: |
          set +e
          terraform plan -out=tfplan -input=false -detailed-exitcode -no-color 2>&1 | tee plan_output.txt
          PLAN_EXIT_CODE=${PIPESTATUS[0]}
          set -e
          echo "plan_exit_code=$PLAN_EXIT_CODE" >> $GITHUB_OUTPUT
          if [ $PLAN_EXIT_CODE -eq 1 ]; then
            echo "::error::Terraform plan failed"
            exit 1
          fi

      - name: Terraform Apply
        if: steps.plan.outputs.plan_exit_code == '2'
        run: terraform apply -auto-approve -input=false tfplan

  # ── Build Deployment Artifacts ───────────────────────────────────
  # Runs in parallel with infrastructure (no dependency on deploy-infrastructure)
  build-artifacts:
    name: Build Deployment Artifacts
    runs-on: ubuntu-latest
    needs: [test-backend, test-chatbot-backend, test-frontend, test-ats-backend, test-ats-frontend, test-ecommerce-backend, test-ecommerce-frontend]
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: '**/package-lock.json'

      - name: Build backend JARs
        run: |
          mvn -f portfolio-backend/pom.xml clean package -DskipTests -q &
          mvn -f portfolio-chatbot-backend/pom.xml clean package -DskipTests -q &
          mvn -f ecommerce-backend/pom.xml clean package -DskipTests -q &
          mvn -f ats-backend/pom.xml clean package -DskipTests -q &
          wait

      - name: Build frontends
        run: |
          mkdir -p artifacts
          (cd portfolio-frontend && npm ci --silent && npm run build -- --configuration production) &
          (cd ecommerce-frontend && npm ci --silent && npm run build -- --configuration production) &
          (cd ats-frontend && npm ci --silent && npm run build -- --configuration production) &
          wait

      - name: Stage artifacts
        run: |
          mkdir -p artifacts
          cp $(ls portfolio-backend/target/*.jar | grep -v -E 'sources|javadoc|original-' | head -1) artifacts/portfolio-backend.jar
          cp $(ls portfolio-chatbot-backend/target/*.jar | grep -v -E 'sources|javadoc|original-' | head -1) artifacts/portfolio-chatbot.jar
          cp $(ls ecommerce-backend/target/*.jar | grep -v -E 'sources|javadoc|original-' | head -1) artifacts/ecommerce-backend.jar
          cp $(ls ats-backend/target/*.jar | grep -v -E 'sources|javadoc|original-' | head -1) artifacts/ats-backend.jar
          cp -r portfolio-frontend/dist/portfolio-frontend/browser artifacts/portfolio-frontend
          cp -r ecommerce-frontend/dist/angular-ecommerce/browser artifacts/ecommerce-frontend
          cp -r ats-frontend/dist/ats-frontend/browser artifacts/ats-frontend

      - name: Verify ATS Flyway migrations are packaged
        run: |
          unzip -l artifacts/ats-backend.jar | grep -q 'db/migration/V1__initial_schema.sql'
          unzip -l artifacts/ats-backend.jar | grep -q 'db/migration/V5__ensure_activity_table_exists.sql'

      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v7
        with:
          name: deployment-artifacts
          path: artifacts/
          retention-days: 7

  # ── Deploy to AWS Lambda + S3 + CloudFront ───────────────────────
  deploy:
    name: Deploy to AWS
    runs-on: ubuntu-latest
    needs: [build-artifacts, deploy-infrastructure]
    permissions:
      id-token: write
      contents: read
    environment:
      name: production
      url: https://clarkfoster.com
    steps:
      - name: Download Build Artifacts
        uses: actions/download-artifact@v8
        with:
          name: deployment-artifacts
          path: artifacts/

      - uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Deploy backend Lambdas
        run: |
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          LAMBDA_BUCKET="prod-lambda-deployments-${ACCOUNT_ID}"

          # Upload JARs to S3 in parallel
          aws s3 cp artifacts/portfolio-backend.jar "s3://${LAMBDA_BUCKET}/portfolio-backend.jar" --only-show-errors &
          aws s3 cp artifacts/portfolio-chatbot.jar "s3://${LAMBDA_BUCKET}/portfolio-chatbot.jar" --only-show-errors &
          aws s3 cp artifacts/ecommerce-backend.jar "s3://${LAMBDA_BUCKET}/ecommerce-backend.jar" --only-show-errors &
          aws s3 cp artifacts/ats-backend.jar "s3://${LAMBDA_BUCKET}/ats-backend.jar" --only-show-errors &
          wait

          # Map of <lambda-function-suffix>:<s3-key>. The chatbot Lambda is
          # named prod-portfolio-chatbot (no "-backend" suffix) so we keep the
          # association explicit instead of inferring the key from the name.
          declare -A FUNC_TO_KEY=(
            [portfolio-backend]=portfolio-backend.jar
            [portfolio-chatbot]=portfolio-chatbot.jar
            [ecommerce-backend]=ecommerce-backend.jar
            [ats-backend]=ats-backend.jar
          )

          # Update Lambda function code from S3
          for func in "${!FUNC_TO_KEY[@]}"; do
            aws lambda update-function-code \
              --function-name "prod-${func}" \
              --s3-bucket "$LAMBDA_BUCKET" \
              --s3-key "${FUNC_TO_KEY[$func]}" \
              --output text --query 'FunctionArn' > /dev/null
          done

          # Wait for all updates to complete
          for func in prod-portfolio-backend prod-portfolio-chatbot prod-ecommerce-backend prod-ats-backend; do
            aws lambda wait function-updated --function-name "$func"
          done

          # Publish new SnapStart versions and update aliases
          for func in prod-portfolio-backend prod-portfolio-chatbot prod-ecommerce-backend prod-ats-backend; do
            VERSION=$(aws lambda publish-version --function-name "$func" --query 'Version' --output text)
            echo "Waiting for ${func} v${VERSION} to become active..."
            aws lambda wait published-version-active --function-name "$func" --qualifier "$VERSION"
            aws lambda update-alias --function-name "$func" --name current \
              --function-version "$VERSION" > /dev/null
            echo "Deployed ${func} v${VERSION}"
          done

      - name: Refresh API Gateway Lambda permissions
        # When Terraform recreates aws_lambda_permission resources (e.g. after a
        # config change), the new IAM policy can take time to propagate. Re-applying
        # the permission here — right after alias updates and before smoke tests —
        # guarantees a fresh, recently-propagated statement is in place.
        run: |
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)

          # Map of <function-name-without-prefix>:<api-gateway-name>:<statement-id>.
          # The chatbot Lambda is invoked by the *portfolio* API Gateway via the
          # /api/chatbot/{proxy+} route, so it shares prod-portfolio-api but uses
          # a distinct statement-id (matching the terraform module).
          declare -a TUPLES=(
            "portfolio-backend:prod-portfolio-api:AllowAPIGatewayInvoke"
            "portfolio-chatbot:prod-portfolio-api:AllowAPIGatewayInvokeChatbot"
            "ecommerce-backend:prod-ecommerce-api:AllowAPIGatewayInvoke"
            "ats-backend:prod-ats-api:AllowAPIGatewayInvoke"
          )
          for tuple in "${TUPLES[@]}"; do
            IFS=':' read -r func api_name stmt_id <<< "$tuple"
            FUNC="prod-${func}"
            REST_ID=$(aws apigateway get-rest-apis \
              --query "items[?name=='${api_name}'].id" \
              --output text 2>/dev/null || echo "")
            if [ -z "$REST_ID" ] || [ "$REST_ID" = "None" ]; then
              echo "No API Gateway found for ${api_name}, skipping ${FUNC}"
              continue
            fi
            SOURCE_ARN="arn:aws:execute-api:${AWS_REGION}:${ACCOUNT_ID}:${REST_ID}/*/*"
            aws lambda remove-permission \
              --function-name "$FUNC" --qualifier current \
              --statement-id "$stmt_id" 2>/dev/null || true
            aws lambda add-permission \
              --function-name "$FUNC" --qualifier current \
              --statement-id "$stmt_id" \
              --action lambda:InvokeFunction \
              --principal apigateway.amazonaws.com \
              --source-arn "$SOURCE_ARN"
            echo "Refreshed permission ${stmt_id} for ${FUNC}:current (api=${api_name})"
          done

      - name: Deploy frontends to S3
        run: |
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)

          sync_frontend() {
            local src=$1 bucket=$2
            aws s3 sync "$src" "s3://${bucket}/" --delete \
              --cache-control "public,max-age=31536000,immutable" \
              --exclude "index.html" --exclude "*.json" --only-show-errors
            aws s3 cp "${src}/index.html" "s3://${bucket}/index.html" \
              --cache-control "public,max-age=0,must-revalidate" --only-show-errors
          }

          sync_frontend "artifacts/portfolio-frontend" "prod-portfolio-frontend-${ACCOUNT_ID}"
          sync_frontend "artifacts/ecommerce-frontend" "prod-ecommerce-frontend-${ACCOUNT_ID}"
          sync_frontend "artifacts/ats-frontend" "prod-ats-frontend-${ACCOUNT_ID}"

      - name: Invalidate CloudFront caches
        run: |
          for DOMAIN in clarkfoster.com shop.clarkfoster.com ats.clarkfoster.com; do
            DIST_ID=$(aws cloudfront list-distributions \
              --query "DistributionList.Items[?Aliases.Items[?@=='${DOMAIN}']].Id" \
              --output text)
            if [ -n "$DIST_ID" ] && [ "$DIST_ID" != "None" ]; then
              aws cloudfront create-invalidation --distribution-id "$DIST_ID" --paths "/*" \
                --output text --query 'Invalidation.Id' > /dev/null
              echo "Invalidated ${DOMAIN} (${DIST_ID})"
            fi
          done

  # ── Post-deploy verification ─────────────────────────────────────
  post-deploy:
    name: Post-Deployment Verification
    runs-on: ubuntu-latest
    needs: [deploy]
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Smoke tests
        run: |
          check_url() {
            local name="$1"
            local url="$2"
            local expected="${3:-}"
            local max_attempts="${4:-5}"
            local body
            local status

            for attempt in $(seq 1 "$max_attempts"); do
              body=$(mktemp)
              headers=$(mktemp)
              status=$(curl -sS -L --compressed --max-time 30 -D "$headers" -o "$body" -w "%{http_code}" "$url" || true)

              if [ "$status" -ge 200 ] && [ "$status" -lt 400 ] && { [ -z "$expected" ] || grep -Fq "$expected" "$body"; }; then
                echo "${name} OK"
                rm -f "$body" "$headers"
                return 0
              fi

              echo "${name} returned HTTP ${status} (attempt ${attempt}/${max_attempts})"
              if [ -n "$expected" ]; then
                echo "Expected response to contain: ${expected}"
              fi
              echo "--- response headers ---"
              cat "$headers"
              echo "--- response body (first 500 bytes, text) ---"
              head -c 500 "$body"; echo
              echo "--- response body (first 200 bytes, hex) ---"
              head -c 200 "$body" | xxd | head -20
              echo "--- body size: $(wc -c < "$body") bytes ---"
              rm -f "$body" "$headers"
              if [ "$attempt" -lt "$max_attempts" ]; then
                sleep 15
              fi
            done

            return 1
          }

          failed=0

          echo "Testing CloudFront distributions..."
          check_url "Portfolio frontend" "https://clarkfoster.com" || failed=1
          check_url "E-Commerce frontend" "https://shop.clarkfoster.com" || failed=1
          check_url "ATS frontend" "https://ats.clarkfoster.com" || failed=1

          echo "Testing API endpoints..."
          check_url "Portfolio API" "https://clarkfoster.com/api/health" '"status"' || failed=1
          check_url "Portfolio Chatbot" "https://clarkfoster.com/api/chatbot/health" '"status"' || failed=1
          check_url "E-Commerce API" "https://shop.clarkfoster.com/api/health" '"status"' || failed=1
          check_url "ATS API" "https://ats.clarkfoster.com/api/health" '"status"' || failed=1

          exit "$failed"

      - name: Print backend logs on smoke failure
        if: failure()
        run: |
          START_TIME=$(( ($(date +%s) - 900) * 1000 ))

          for func in prod-portfolio-backend prod-portfolio-chatbot prod-ecommerce-backend prod-ats-backend; do
            echo "===== ${func} ====="
            echo "--- Alias 'current' config ---"
            aws lambda get-alias --function-name "$func" --name current 2>/dev/null || echo "(no alias)"
            echo "--- Alias resource policy ---"
            aws lambda get-policy --function-name "$func" --qualifier current 2>/dev/null \
              | python3 -c 'import json,sys;d=json.load(sys.stdin);print(d.get("Policy",d))' 2>/dev/null \
              || echo "(no policy)"
            echo "--- Function configuration (alias version) ---"
            VER=$(aws lambda get-alias --function-name "$func" --name current --query 'FunctionVersion' --output text 2>/dev/null || echo "")
            if [ -n "$VER" ] && [ "$VER" != "None" ]; then
              aws lambda get-function-configuration --function-name "$func" --qualifier "$VER" \
                --query '{State:State,LastUpdateStatus:LastUpdateStatus,SnapStart:SnapStart}' 2>/dev/null || true
            fi
            echo "--- Recent logs for ${func} ---"
            aws logs filter-log-events \
              --log-group-name "/aws/lambda/${func}" \
              --start-time "$START_TIME" \
              --query 'events[].message' \
              --output text 2>/dev/null | tail -200 || true
          done

          echo "===== API Gateway execution logs ====="
          for api in prod-portfolio-api prod-ecommerce-api prod-ats-api; do
            REST_ID=$(aws apigateway get-rest-apis --query "items[?name=='${api}'].id" --output text 2>/dev/null)
            if [ -n "$REST_ID" ] && [ "$REST_ID" != "None" ]; then
              LG="API-Gateway-Execution-Logs_${REST_ID}/prod"
              echo "--- ${api} (${LG}) ---"
              aws logs filter-log-events --log-group-name "$LG" --start-time "$START_TIME" \
                --query 'events[].message' --output text 2>/dev/null | tail -100 \
                || echo "(no execution log group — enable logging or none generated)"
            fi
          done

      - name: Deployment notification
        if: always()
        run: echo "Deployment ${{ job.status }} at $(date) — commit ${{ github.sha }}"
