name: Deploy to Production

on:
  push:
    branches: [main]

# Serialize production deployments — queue, never cancel in-progress
concurrency:
  group: deploy-production
  cancel-in-progress: false

env:
  AWS_REGION: us-east-1
  ECS_CLUSTER: prod-portfolio-cluster

jobs:
  # ── Quality gates (all run in parallel) ──────────────────────────
  security:
    name: Security Scan
    permissions:
      security-events: write
      contents: read
    uses: ./.github/workflows/reusable-security.yml

  code-quality:
    name: Code Quality (SonarCloud)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-java@v5
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: maven

      - name: Compile backends for analysis
        run: |
          cd portfolio-backend && mvn compile -DskipTests -q
          cd ../ats-backend && mvn compile -DskipTests -q
          cd ../ecommerce-backend && mvn compile -DskipTests -q

      - name: SonarCloud Scan
        uses: SonarSource/sonarqube-scan-action@v7
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        continue-on-error: true

  test-backend:
    name: Backend Tests
    uses: ./.github/workflows/reusable-test.yml
    with:
      component: portfolio-backend
      type: java

  test-frontend:
    name: Frontend Tests
    uses: ./.github/workflows/reusable-test.yml
    with:
      component: portfolio-frontend
      type: node
      node-test-args: '--no-watch --code-coverage --browsers=ChromeHeadless'

  test-ats-backend:
    name: ATS Backend Tests
    uses: ./.github/workflows/reusable-test.yml
    with:
      component: ats-backend
      type: java

  test-ats-frontend:
    name: ATS Frontend Tests
    uses: ./.github/workflows/reusable-test.yml
    with:
      component: ats-frontend
      type: node

  test-ecommerce-backend:
    name: Ecommerce Backend Tests
    uses: ./.github/workflows/reusable-test.yml
    with:
      component: ecommerce-backend
      type: java

  test-ecommerce-frontend:
    name: Ecommerce Frontend Tests
    uses: ./.github/workflows/reusable-test.yml
    with:
      component: ecommerce-frontend
      type: node

  # ── Infrastructure ───────────────────────────────────────────────
  deploy-infrastructure:
    name: Deploy Infrastructure (Terraform)
    runs-on: ubuntu-latest
    needs: [test-backend, test-frontend, test-ats-backend, test-ats-frontend, test-ecommerce-backend, test-ecommerce-frontend, code-quality, security]
    permissions:
      id-token: write
      contents: read
    defaults:
      run:
        working-directory: terraform
    steps:
      - uses: actions/checkout@v6

      - uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: 1.6.0
          terraform_wrapper: false

      - name: Terraform Init
        run: terraform init

      - name: Clear stale Terraform locks
        run: |
          LOCK_INFO=$(aws dynamodb get-item \
            --table-name portfolio-terraform-locks \
            --key '{"LockID": {"S": "clarkfoster-portfolio-tf-state/portfolio/terraform.tfstate"}}' \
            --region eu-west-2 --output json 2>/dev/null || echo '{}')

          if [ "$LOCK_INFO" != "{}" ] && [ "$(echo $LOCK_INFO | jq -r '.Item')" != "null" ]; then
            LOCK_CREATED=$(echo $LOCK_INFO | jq -r '.Item.Info.S' | jq -r '.Created' 2>/dev/null || echo "")
            if [ -n "$LOCK_CREATED" ]; then
              LOCK_AGE=$(( $(date +%s) - $(date -d "$LOCK_CREATED" +%s 2>/dev/null || echo "0") ))
              echo "Lock age: ${LOCK_AGE}s"
              if [ $LOCK_AGE -gt 1800 ]; then
                echo "Stale lock (>30 min), clearing..."
                aws dynamodb delete-item \
                  --table-name portfolio-terraform-locks \
                  --key '{"LockID": {"S": "clarkfoster-portfolio-tf-state/portfolio/terraform.tfstate"}}' \
                  --region eu-west-2
              fi
            else
              echo "Cannot parse lock timestamp, clearing..."
              aws dynamodb delete-item \
                --table-name portfolio-terraform-locks \
                --key '{"LockID": {"S": "clarkfoster-portfolio-tf-state/portfolio/terraform.tfstate"}}' \
                --region eu-west-2
            fi
          else
            echo "No existing lock found"
          fi

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Plan
        id: plan
        run: |
          set +e
          terraform plan -out=tfplan -input=false -detailed-exitcode -no-color 2>&1 | tee plan_output.txt
          PLAN_EXIT_CODE=${PIPESTATUS[0]}
          set -e
          echo "plan_exit_code=$PLAN_EXIT_CODE" >> $GITHUB_OUTPUT
          if [ $PLAN_EXIT_CODE -eq 1 ]; then
            echo "::error::Terraform plan failed"
            exit 1
          fi

      - name: Terraform Apply
        if: steps.plan.outputs.plan_exit_code == '2'
        run: terraform apply -auto-approve -input=false tfplan

  # ── Docker build, push & scan ────────────────────────────────────
  build-and-push:
    name: Build & Push Docker Images
    runs-on: ubuntu-latest
    needs: [test-backend, test-frontend, test-ats-backend, test-ats-frontend, test-ecommerce-backend, test-ecommerce-frontend, code-quality, deploy-infrastructure]
    permissions:
      id-token: write
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v6

      - uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - uses: docker/setup-buildx-action@v4

      - name: Build and push all images
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          # directory | ecr-repo | needs --build-arg GIT_COMMIT
          IMAGES=(
            "portfolio-backend|portfolio-backend|true"
            "portfolio-frontend|portfolio-frontend|false"
            "ecommerce-backend|ecommerce-backend|true"
            "ecommerce-frontend|ecommerce-frontend|false"
            "ecommerce-db|ecommerce-db|false"
            "ats-backend|ats-backend|true"
            "ats-frontend|ats-frontend|false"
            "ats-db|ats-db|false"
          )
          for entry in "${IMAGES[@]}"; do
            IFS='|' read -r dir repo needs_git_arg <<< "$entry"
            BUILD_ARGS=""
            [[ "$needs_git_arg" == "true" ]] && BUILD_ARGS="--build-arg GIT_COMMIT=${IMAGE_TAG}"
            echo "::group::Building $repo from ./$dir"
            docker buildx build $BUILD_ARGS --provenance=false \
              -t "$ECR_REGISTRY/$repo:$IMAGE_TAG" --push "./$dir"
            echo "::endgroup::"
          done

      - name: Install Trivy
        run: |
          curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh \
            | sudo sh -s -- -b /usr/local/bin

      - name: Scan all images with Trivy
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          mkdir -p trivy-results
          REPOS=(
            "portfolio-backend" "portfolio-frontend"
            "ecommerce-backend" "ecommerce-frontend" "ecommerce-db"
            "ats-backend" "ats-frontend" "ats-db"
          )
          for repo in "${REPOS[@]}"; do
            echo "::group::Scanning $repo"
            trivy image --format sarif --output "trivy-results/${repo}.sarif" \
              --severity CRITICAL,HIGH \
              "$ECR_REGISTRY/$repo:$IMAGE_TAG" || true
            echo "::endgroup::"
          done
        continue-on-error: true

      - name: Upload Trivy scan results
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: trivy-results
        continue-on-error: true

  # ── ECS deployment (3 parallel groups) ────────────────────────────
  deploy-portfolio:
    name: Deploy Portfolio
    runs-on: ubuntu-latest
    needs: [build-and-push]
    permissions:
      id-token: write
      contents: read
    environment:
      name: production
      url: https://clarkfoster.com
    steps:
      - uses: actions/checkout@v6

      - uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - id: ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Render backend task definition
        id: backend-td
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: ecs-task-definitions/portfolio-backend.json
          container-name: backend
          image: ${{ steps.ecr.outputs.registry }}/portfolio-backend:${{ github.sha }}

      - name: Deploy backend
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition: ${{ steps.backend-td.outputs.task-definition }}
          service: prod-portfolio-backend
          cluster: ${{ env.ECS_CLUSTER }}
          wait-for-service-stability: true
          wait-for-minutes: 15

      - name: Render frontend task definition
        id: frontend-td
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: ecs-task-definitions/portfolio-frontend.json
          container-name: frontend
          image: ${{ steps.ecr.outputs.registry }}/portfolio-frontend:${{ github.sha }}

      - name: Deploy frontend
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition: ${{ steps.frontend-td.outputs.task-definition }}
          service: prod-portfolio-frontend
          cluster: ${{ env.ECS_CLUSTER }}
          wait-for-service-stability: true
          wait-for-minutes: 15

  deploy-ecommerce:
    name: Deploy E-Commerce
    runs-on: ubuntu-latest
    needs: [build-and-push]
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v6

      - uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - id: ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Render e-commerce backend task definition
        id: ecom-backend-td
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: ecs-task-definitions/ecommerce-backend.json
          container-name: ecommerce-backend
          image: ${{ steps.ecr.outputs.registry }}/ecommerce-backend:${{ github.sha }}

      - name: Render e-commerce DB sidecar into task definition
        id: ecom-backend-td-db
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: ${{ steps.ecom-backend-td.outputs.task-definition }}
          container-name: ecommerce-db
          image: ${{ steps.ecr.outputs.registry }}/ecommerce-db:${{ github.sha }}

      - name: Deploy e-commerce backend
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition: ${{ steps.ecom-backend-td-db.outputs.task-definition }}
          service: prod-ecommerce-backend
          cluster: ${{ env.ECS_CLUSTER }}
          wait-for-service-stability: true
          wait-for-minutes: 15

      - name: Render e-commerce frontend task definition
        id: ecom-frontend-td
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: ecs-task-definitions/ecommerce-frontend.json
          container-name: ecommerce-frontend
          image: ${{ steps.ecr.outputs.registry }}/ecommerce-frontend:${{ github.sha }}

      - name: Deploy e-commerce frontend
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition: ${{ steps.ecom-frontend-td.outputs.task-definition }}
          service: prod-ecommerce-frontend
          cluster: ${{ env.ECS_CLUSTER }}
          wait-for-service-stability: true
          wait-for-minutes: 15

  deploy-ats:
    name: Deploy ATS
    runs-on: ubuntu-latest
    needs: [build-and-push]
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v6

      - uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - id: ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Render ATS backend task definition
        id: ats-backend-td
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: ecs-task-definitions/ats-backend.json
          container-name: ats-backend
          image: ${{ steps.ecr.outputs.registry }}/ats-backend:${{ github.sha }}

      - name: Render ATS DB sidecar into task definition
        id: ats-backend-td-db
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: ${{ steps.ats-backend-td.outputs.task-definition }}
          container-name: ats-db
          image: ${{ steps.ecr.outputs.registry }}/ats-db:${{ github.sha }}

      - name: Deploy ATS backend
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition: ${{ steps.ats-backend-td-db.outputs.task-definition }}
          service: prod-ats-backend
          cluster: ${{ env.ECS_CLUSTER }}
          wait-for-service-stability: true
          wait-for-minutes: 15

      - name: Render ATS frontend task definition
        id: ats-frontend-td
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: ecs-task-definitions/ats-frontend.json
          container-name: ats-frontend
          image: ${{ steps.ecr.outputs.registry }}/ats-frontend:${{ github.sha }}

      - name: Deploy ATS frontend
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition: ${{ steps.ats-frontend-td.outputs.task-definition }}
          service: prod-ats-frontend
          cluster: ${{ env.ECS_CLUSTER }}
          wait-for-service-stability: true
          wait-for-minutes: 15

  # ── Post-deploy verification ─────────────────────────────────────
  post-deploy:
    name: Post-Deployment Verification
    runs-on: ubuntu-latest
    needs: [deploy-portfolio, deploy-ecommerce, deploy-ats]
    steps:
      - name: Smoke tests
        run: |
          API_VERSION=$(curl -s https://clarkfoster.com/api/version)
          DEPLOYED_COMMIT=$(echo $API_VERSION | jq -r '.commit')
          echo "Expected: ${{ github.sha }}, Deployed: $DEPLOYED_COMMIT"
          if [[ "$DEPLOYED_COMMIT" != "${{ github.sha }}" ]]; then
            echo "Warning: version mismatch — backend may still be restarting"
          else
            echo "Version verified"
          fi
          echo | openssl s_client -servername clarkfoster.com -connect clarkfoster.com:443 2>/dev/null | openssl x509 -noout -dates
          time curl -s https://clarkfoster.com > /dev/null

      - name: Deployment notification
        if: always()
        run: echo "Deployment ${{ job.status }} at $(date) — ${{ github.sha }}"
