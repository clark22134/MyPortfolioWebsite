spring.application.name=portfolio-chatbot-backend
server.port=8081

# spring-webflux is pulled in transitively by spring-ai-openai. Pinning the
# servlet stack prevents Spring Boot from auto-configuring both stacks (which
# silently breaks JSON HTTP message converters on the servlet path).
spring.main.web-application-type=servlet

# Force-disable every reactive auto-config that spring-webflux on the
# classpath would otherwise activate. Without these exclusions, Spring Boot
# partially wires up reactive infrastructure even with web-application-type
# =servlet, which prevents DispatcherServlet from being registered with the
# embedded Tomcat (every request then returns HTTP 200 with an empty body).
#
# The original four exclusions were sufficient for Spring Boot < 3.5. Spring
# Boot 3.5.x introduced additional auto-configurations that are conditioned on
# spring-webflux being present on the classpath (via @ConditionalOnClass) and
# also interfere with the servlet stack:
#   - WebFluxObservationAutoConfiguration  (Spring Boot 3.0+)
#   - CodecsAutoConfiguration              (registers reactive JacksonCodecCustomizer)
#   - WebClientCodecAutoConfiguration      (reactive codec customizer for WebClient)
#   - ReactorAutoConfiguration             (Spring Boot 3.2+ Reactor scheduler setup)
#
# Note: WebClientAutoConfiguration is intentionally NOT excluded because
# spring-ai-openai uses WebClient as its HTTP client to OpenAI.
spring.autoconfigure.exclude=\
  org.springframework.boot.autoconfigure.web.reactive.WebFluxAutoConfiguration,\
  org.springframework.boot.autoconfigure.web.reactive.HttpHandlerAutoConfiguration,\
  org.springframework.boot.autoconfigure.web.reactive.ReactiveWebServerFactoryAutoConfiguration,\
  org.springframework.boot.autoconfigure.web.reactive.error.ErrorWebFluxAutoConfiguration,\
  org.springframework.boot.autoconfigure.web.reactive.WebFluxObservationAutoConfiguration,\
  org.springframework.boot.autoconfigure.codec.CodecsAutoConfiguration,\
  org.springframework.boot.autoconfigure.web.reactive.function.client.WebClientCodecAutoConfiguration,\
  org.springframework.boot.autoconfigure.reactor.ReactorAutoConfiguration

# Actuator
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=always

# CORS — only the public site needs to hit this Lambda.
cors.allowed.origins=http://localhost,http://localhost:4200,https://clarkfoster.com,https://www.clarkfoster.com

# ===========================================================================
# Chatbot configuration
# ===========================================================================
# The chatbot is auto-disabled if OPENAI_API_KEY is missing. With it disabled
# the Lambda still starts cleanly and /api/chatbot/health reports
# {"available":false}; nothing else changes.
chatbot.enabled=${CHATBOT_ENABLED:true}
chatbot.docs.path=${CHATBOT_DOCS_PATH:docs}
chatbot.rate-limit.per-minute=${CHATBOT_RATE_LIMIT_PER_MIN:20}

# Spring AI / OpenAI
spring.ai.openai.api-key=${OPENAI_API_KEY:}
spring.ai.openai.chat.options.model=${OPENAI_CHAT_MODEL:gpt-4o-mini}
spring.ai.openai.chat.options.temperature=${OPENAI_CHAT_TEMPERATURE:0.2}
spring.ai.openai.embedding.options.model=${OPENAI_EMBEDDING_MODEL:text-embedding-3-small}

# Auto-configuration switches: OpenAiAudio*/Image*/Moderation* models would
# otherwise be eagerly instantiated and fail at startup whenever the API key
# is empty (which is the case for dev/CI). Pinning them to "none" keeps
# context refresh deterministic.
spring.ai.model.chat=${SPRING_AI_MODEL_CHAT:openai}
spring.ai.model.embedding=${SPRING_AI_MODEL_EMBEDDING:openai}
spring.ai.model.audio.speech=none
spring.ai.model.audio.transcription=none
spring.ai.model.image=none
spring.ai.model.moderation=none

# App version
app.version=1.0.0
app.commit=${GIT_COMMIT:unknown}
